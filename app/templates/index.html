<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recommendation System</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <h2 class="text-center mb-4">Personalized Offer Recommender</h2>

    <!-- Input Section -->
    <div class="card p-4 shadow">
        <div class="mb-3">
            <label class="form-label">Enter User ID</label>
            <input type="number" id="userId" class="form-control" placeholder="e.g. 1">
        </div>

        <button class="btn btn-primary w-100" onclick="getRecommendations()">
            Get Recommendations
        </button>
    </div>

    <!-- Results -->
    <div class="row mt-4" id="results"></div>
</div>

<script>
async function getRecommendations() {
    console.log("BUTTON CLICKED");

    const userId = document.getElementById('userId').value;

    if (!userId) {
        alert("Please enter a User ID");
        return;
    }

    try {
        const response = await fetch(`http://127.0.0.1:5000//recommend?user_id=${userId}`);
        const data = await response.json();

        console.log("API DATA:", data);

        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = "";

        data.sort((a, b) => b.score - a.score);

        data.forEach((item, index) => {
            const card = document.createElement("div");
            card.className = "col-md-4";

            card.innerHTML = `
                <div class="card shadow-lg mb-3 border-0">
                    <div class="card-body text-center">

                        ${index === 0 ? '<span class="badge bg-success mb-2">Top Pick</span>' : ''}

                        <h5 class="card-title text-primary fw-bold">
                            ${item.category.toUpperCase()}
                        </h5>

                        <p class="text-muted">Discount: ${item.discount}%</p>

                        <h4 class="text-success">
                            Score: ${Number(item.score).toFixed(2)}
                        </h4>
                    </div>
                </div>
            `;

            resultsDiv.appendChild(card);
        });

    }
    catch (error) {
        console.error("ERROR:", error);
        alert("Something went wrong. Check console.");
    }
}
</script>

</body>
</html>
