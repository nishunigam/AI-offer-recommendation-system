<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recommendation System</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">

<div class="container py-5">

    <!-- Title -->
    <div class="text-center mb-5">
        <h1 class="fw-bold">AI Offer Recommendation System</h1>
        <p class="text-muted">Get personalized offers based on your behavior</p>
    </div>

    <!-- Input Card -->
    <div class="card shadow-lg p-4 bg-secondary text-white">
        <div class="row g-3 align-items-center">
            <div class="col-md-8">
                <input type="number" id="userId" class="form-control form-control-lg"
                       placeholder="Enter User ID">
            </div>
            <div class="col-md-4 d-grid">
                <button class="btn btn-warning btn-lg" onclick="getRecommendations()">
                    Get Recommendations
                </button>
            </div>
        </div>
    </div>

    <!-- Loading -->
    <div id="loading" class="text-center mt-4 d-none">
        <div class="spinner-border text-warning"></div>
        <p>Fetching recommendations...</p>
    </div>

    <!-- Results -->
    <div id="results" class="row mt-5"></div>

</div>

<script>
async function getRecommendations() {
    const userId = document.getElementById("userId").value;
    const resultsDiv = document.getElementById("results");
    const loading = document.getElementById("loading");

    resultsDiv.innerHTML = "";
    loading.classList.remove("d-none");

    try {
        const response = await fetch(`/recommend?user_id=${userId}`);
        const data = await response.json();

        loading.classList.add("d-none");

        if (data.error) {
            resultsDiv.innerHTML = `<p class="text-danger">${data.error}</p>`;
            return;
        }

        data.forEach((offer, index) => {
            const isTop = index === 0;

            const card = `
                <div class="col-md-4 mb-4">
                    <div class="card h-100 shadow ${isTop ? 'border-warning border-3' : ''}">
                        <div class="card-body text-dark">
                            <h5 class="card-title">${offer.category.toUpperCase()}</h5>
                            <p>Discount: <strong>${offer.discount}%</strong></p>
                            <p>Score: ${offer.score.toFixed(2)}</p>
                            ${isTop ? '<span class="badge bg-warning text-dark">Top Recommendation</span>' : ''}
                        </div>
                    </div>
                </div>
            `;

            resultsDiv.innerHTML += card;
        });

    } catch (error) {
        console.error(error);
        loading.classList.add("d-none");
        resultsDiv.innerHTML = `<p class="text-danger">Something went wrong</p>`;
    }
}
</script>

</body>
</html>
